apiVersion: v1
kind: Namespace
metadata:
  name: saab-ai

---
# Persistent storage for Ollama models (~6GB for deepseek-r1:8b)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: saab-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# Ollama server — hosts the DeepSeek model
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: saab-ai
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "16Gi"
              cpu: "8"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: saab-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434

---
# Init job — pulls the DeepSeek model into Ollama after first deploy
apiVersion: batch/v1
kind: Job
metadata:
  name: pull-deepseek-model
  namespace: saab-ai
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until wget -qO- http://ollama:11434/api/tags >/dev/null 2>&1; do
                sleep 2
              done
              echo "Ollama is ready."
      containers:
        - name: pull-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Pulling deepseek-r1:8b..."
              curl -s http://ollama:11434/api/pull \
                -d '{"name": "deepseek-r1:8b"}' \
                --max-time 1800
              echo "Model pull complete."

---
# SAAB Knowledge chatbot
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saab-chat
  namespace: saab-ai
  labels:
    app: saab-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saab-chat
  template:
    metadata:
      labels:
        app: saab-chat
    spec:
      containers:
        - name: saab-chat
          image: 192.168.87.35:5000/saab-ai:latest    # see QuickStart.md for build instructions
          imagePullPolicy: Always
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          stdin: true
          tty: true
