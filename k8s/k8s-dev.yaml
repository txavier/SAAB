apiVersion: v1
kind: Namespace
metadata:
  name: saab-ai

---
# Persistent storage for Ollama models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: saab-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# Persistent storage for the dev workspace (survives pod restarts)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-workspace
  namespace: saab-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Ollama server — hosts the DeepSeek model
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: saab-ai
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "6Gi"
              cpu: "2"
            limits:
              memory: "10Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: saab-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434

---
# Init job — pulls the DeepSeek model into Ollama after first deploy
apiVersion: batch/v1
kind: Job
metadata:
  name: pull-deepseek-model
  namespace: saab-ai
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-ollama
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Ollama to be ready..."
              until wget -qO- http://ollama:11434/api/tags >/dev/null 2>&1; do
                sleep 2
              done
              echo "Ollama is ready."
      containers:
        - name: pull-model
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Pulling deepseek-r1:8b..."
              curl -s http://ollama:11434/api/pull \
                -d '{"name": "deepseek-r1:8b"}' \
                --max-time 1800
              echo "Model pull complete."

---
# Dev sandbox — clone the repo here and connect VS Code to it
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saab-dev
  namespace: saab-ai
  labels:
    app: saab-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saab-dev
  template:
    metadata:
      labels:
        app: saab-dev
    spec:
      containers:
        - name: dev
          image: saab-dev:latest   # build with: docker build -f Dockerfile.dev -t saab-dev .
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
          stdin: true
          tty: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: dev-workspace
